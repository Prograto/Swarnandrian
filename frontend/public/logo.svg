<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F7CF3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7C8CFF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F6B8C6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#CDEDE1;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#g1)"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Letter S -->
  <text x="100" y="130" text-anchor="middle" font-family="Plus Jakarta Sans, Arial, sans-serif" font-weight="800" font-size="96" fill="white" letter-spacing="-2">S</text>
  <!-- Accent dot -->
  <circle cx="148" cy="52" r="12" fill="url(#g2)" opacity="0.9"/>
