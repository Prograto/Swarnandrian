services:
  # ─────────────────────────────────────────
  # Main FastAPI Backend
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - swarnandrian_net
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─────────────────────────────────────────
  # React Frontend (served via nginx in prod)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - swarnandrian_net

  # ─────────────────────────────────────────
  # Code Execution Microservice
  # All runtimes installed inside one container
  # ─────────────────────────────────────────
  code-runner:
    build:
      context: ./code-runner
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8001"
    networks:
      - swarnandrian_net

  # ─────────────────────────────────────────
  # Redis (WebSocket + Caching)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - swarnandrian_net
    volumes:
      - redis_data:/data

  # ─────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - swarnandrian_net

networks:
  swarnandrian_net:
    driver: bridge

volumes:
  redis_data:
